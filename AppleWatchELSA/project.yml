name: KiroHacksFallRisk
options:
  bundleIdPrefix: com.kirohacks
  deploymentTarget:
    watchOS: "11.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  FallRiskWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - FallRiskWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kirohacks.fallrisk.watch
        PRODUCT_NAME: ELSAMonitor
        INFOPLIST_FILE: FallRiskWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: FallRiskWatch/FallRiskWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    dependencies:
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
      - sdk: HealthKit.framework
      - sdk: WatchKit.framework
schemes:
  FallRiskWatch:
    build:
      targets:
        FallRiskWatch: all
    run:
      config: Debug
